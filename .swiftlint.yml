# SwiftLint Configuration for SendspinKit

excluded:
  - .build
  - Examples

# Disabled rules
disabled_rules:
  - todo

# Opt-in rules
opt_in_rules:
  - trailing_comma

# File and function length - adjusted for protocol implementation needs.
# SendspinClient.swift is ~1150 lines (protocol orchestrator with many message handlers).
# SendspinMessage.swift is ~880 lines (one struct per protocol message type).
file_length:
  warning: 900
  error: 1200

function_body_length:
  warning: 100
  error: 150

# SendspinClient is the protocol orchestrator — its class body holds connection
# lifecycle, message dispatch, handlers, clock sync, and audio chunk processing.
# Splitting further would require exposing private state across files.
type_body_length:
  warning: 800
  error: 1000

# Cyclomatic complexity - adjusted for real-world protocol handling
cyclomatic_complexity:
  warning: 30
  error: 40

# Line length
line_length:
  warning: 150
  error: 200
  ignores_comments: true
  ignores_urls: true

# Identifier names
identifier_name:
  min_length:
    warning: 3
    error: 2
  excluded:
    - id
    - to
    - db
    - i   # loop counter
    - t   # time variable in tests
    - v   # value in decode/encode
    - p   # payload destructuring
    - b0  # byte unpacking
    - b1
    - b2
    - fs  # frameSize (audio callback hot path)
    - sr  # sampleRate (audio callback hot path)
    - dt  # delta time (Kalman filter)

# Trailing commas - never allow them (matches SwiftFormat config)
trailing_comma:
  mandatory_comma: false

# Large tuple
large_tuple:
  warning: 4
  error: 5

# Force casts are acceptable in test assertions (JSON parsing, etc.)
force_cast:
  severity: warning
