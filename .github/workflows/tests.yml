name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install tools
        run: brew install swiftformat swiftlint

      - name: SwiftFormat (lint mode)
        run: swiftformat --lint .

      - name: SwiftLint
        run: swiftlint lint --strict

  test:
    name: Test
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Run all tests with coverage
        run: swift test --enable-code-coverage

      - name: Generate LCOV report
        run: |
          BIN=$(find .build/debug -name "SendspinKitPackageTests" -type f -not -path "*.build/*" -not -path "*.product/*" -not -path "*.derived/*" | head -1)
          xcrun llvm-cov export \
            -format="lcov" \
            "$BIN" \
            -instr-profile .build/debug/codecov/default.profdata \
            > coverage.lcov

      - name: Generate coverage summary
        id: coverage
        run: |
          BIN=$(find .build/debug -name "SendspinKitPackageTests" -type f -not -path "*.build/*" -not -path "*.product/*" -not -path "*.derived/*" | head -1)

          xcrun llvm-cov report \
            "$BIN" \
            -instr-profile .build/debug/codecov/default.profdata \
            > coverage-report.txt

          COVERAGE=$(grep TOTAL coverage-report.txt | awk '{print $NF}')
          echo "coverage=$COVERAGE" >> "$GITHUB_OUTPUT"

          echo "### Test Coverage Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Overall Coverage: $COVERAGE**" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat coverage-report.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Check coverage threshold
        run: |
          COVERAGE=$(echo "${{ steps.coverage.outputs.coverage }}" | sed 's/%//')
          THRESHOLD=40

          if (( $(echo "$COVERAGE < $THRESHOLD" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% is below threshold ${THRESHOLD}%"
            exit 1
          else
            echo "Coverage ${COVERAGE}% meets threshold ${THRESHOLD}%"
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.lcov
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Comment PR with coverage
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const coverage = '${{ steps.coverage.outputs.coverage }}';
            const report = fs.readFileSync('coverage-report.txt', 'utf8');

            const body = [
              `## Test Coverage Report`,
              ``,
              `**Overall Coverage: ${coverage}**`,
              ``,
              `<details>`,
              `<summary>Detailed Coverage Report</summary>`,
              ``,
              '```',
              report.trim(),
              '```',
              ``,
              `</details>`,
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            coverage.lcov
            coverage-report.txt
          retention-days: 30
